<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydrangea Encoding Conversion</title>
    <link rel="icon" href="./bread_128.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"

<body>

            </div>

            <div id="hexademicalStr" class="mb-3">

            </div>
            <h3 class="mb-3">Base64</h3>
            <div id="base64Str" class="mb-3">

            </div>
            <h3 class="mb-3">Md5</h3>
            <div id="md5Str" class="mb-3">

            </div>
            <h3 class="mb-3">Sha1</h3>
            <div id="sha1Str" class="mb-3">

            </div>
        </div>
    </div>
